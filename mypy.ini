[mypy]
# Global options
python_version = 3.12
# Exclude directories
exclude = ^(examples/|models/)
# Strict mode - Enhanced
strict = True
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_optional = True
disallow_any_generics = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
disallow_untyped_calls = True
disallow_subclassing_any = True
check_untyped_defs = True
no_implicit_optional = True
show_error_codes = True
show_column_numbers = True
pretty = True

# Enhanced strictness rules
strict_equality = True
strict_concatenate = True
# Too strict for decorators like @staticmethod, @cache
disallow_any_decorated = False
disallow_any_explicit = False
disallow_any_expr = False
disallow_any_unimported = True
extra_checks = True
allow_redefinition = False
local_partial_types = True
implicit_reexport = False
warn_incomplete_stub = True
# Enhanced error reporting
show_absolute_path = True
color_output = True

# Per-module options
[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

# Temporary ignores for migration files (database models)

# Additional ignores for third-party libraries
[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-starlette.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-email_validator.*]
ignore_missing_imports = True

[mypy-bcrypt.*]
ignore_missing_imports = True

[mypy-cryptography.*]
ignore_missing_imports = True

[mypy-webauthn.*]
ignore_missing_imports = True

[mypy-pyotp.*]
ignore_missing_imports = True

[mypy-qrcode.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-twilio.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-redis.asyncio.*]
ignore_missing_imports = True

# Disable certain checks for stub files
[mypy-stubs.*]
follow_imports = skip
ignore_errors = True

# Exclude examples directory from type checking (for demo purposes)
[mypy-examples.*]
ignore_errors = True

# Progressive type checking - Reduce ignores gradually
[mypy-app.Support.Config]
warn_unreachable = False

# Core services should have strict typing
[mypy-app.Services.*]
strict = True
disallow_any_generics = True
disallow_untyped_defs = True
warn_return_any = True

# Models should have strict typing
[mypy-app.Models.*]
strict = True
disallow_any_generics = True
disallow_untyped_defs = True

# HTTP layer should have strict typing
[mypy-app.Http.Controllers.*]
strict = True
disallow_untyped_defs = True

[mypy-app.Http.Requests.*]
strict = True
disallow_untyped_defs = True

[mypy-app.Http.Resources.*]
strict = True
disallow_untyped_defs = True

[mypy-app.Http.Schemas.*]
strict = True
disallow_untyped_defs = True

# Utilities and core components
[mypy-app.Utils.*]
strict = True
disallow_any_generics = True

[mypy-app.Cache.*]
strict = True

[mypy-app.Queue.*]
strict = True

# Temporarily relaxed for complex modules
[mypy-app.Horizon.*]
ignore_errors = True

[mypy-app.Telescope.*]
ignore_errors = True

[mypy-routes.sanctum]
ignore_errors = True

[mypy-database.Schema.*]
ignore_errors = True

[mypy-app.Http.Middleware.*]
disallow_untyped_defs = False

[mypy-app.Socialite.*]
ignore_errors = True

[mypy-app.Testing.*]
disallow_untyped_defs = False

[mypy-app.Sanctum.*]
ignore_errors = True

[mypy-database.migrations.*]
ignore_errors = True

[mypy-routes.telescope]
ignore_errors = True

# Jobs should have strict typing for reliability
[mypy-app.Jobs.*]
strict = True
disallow_untyped_defs = True
warn_return_any = True